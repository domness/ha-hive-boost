start_boost:
  name: Start Boost
  description: >
    Boost a Hive TRV or thermostat to a target temperature for a set duration.
    The climate entity will automatically revert to its schedule when the boost ends.
  fields:
    entity_id:
      name: Climate Entity
      description: The Hive climate entity to boost (e.g. climate.lounge)
      required: true
      selector:
        entity:
          domain: climate
    temperature:
      name: Boost Temperature
      description: Target temperature during the boost (°C)
      required: true
      default: 22
      selector:
        number:
          min: 5
          max: 32
          step: 1
          unit_of_measurement: "°C"
          mode: slider
    duration_minutes:
      name: Duration (minutes)
      description: How long to boost for, in minutes (15–180)
      required: true
      default: 60
      selector:
        number:
          min: 15
          max: 180
          step: 15
          unit_of_measurement: "min"
          mode: slider

cancel_boost:
  name: Cancel Boost
  description: >
    Cancel an active boost on a Hive TRV or thermostat.
    The climate entity will immediately revert to its schedule.
  fields:
    entity_id:
      name: Climate Entity
      description: The Hive climate entity whose boost should be cancelled
      required: true
      selector:
        entity:
          domain: climate
